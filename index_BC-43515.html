
<!DOCTYPE html>
<!--
  BC-43515 — PARENT page (cross-origin top window).
​
  Deploy to: https://www.blueconic.test/BC-43515/parent.html
  Open that URL on VPN (not this file on taylor-shopping.com).

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>BC-43515 — parent (blueconic.test)</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 1.5rem; color: #222; }
      h1 { font-size: 1.1rem; }
      .meta { color: #666; font-size: 0.9rem; margin-bottom: 1rem; line-height: 1.5; }
      iframe { width: 100%; height: 700px; border: 2px solid #333; border-radius: 4px; }
      code { background: #f4f4f4; padding: 0.1rem 0.35rem; border-radius: 3px; }
    </style>
  </head>
  <body>
    <h1>Parent page — origin <code id="origin"></code></h1>
    <p class="meta">
      Cross-origin iframe: <code id="iframeUrl"></code><br />
      Open DevTools → select the <strong>iframe</strong> → Network.<br />
      <strong>Script on channel page:</strong> <code id="scriptHost"></code>/script.js<br />
      <strong>BC-43515 pass:</strong> iframe RPC host is <code id="expectedRpcHost"></code>
      (FPHC CNAME, not tenant).<br />
      <strong>Fail (old bug):</strong> iframe RPC uses <code id="tenantHost"></code>.
    </p>
    <iframe id="channelFrame" title="Taylor FPHC channel page (cross-origin iframe)"></iframe>
    <script>
      var CHANNEL_PAGE_URL = 'https://www.taylor-shopping.com/index_m675.html';
​
      var BLUECONIC_HOSTNAME = 'm675.taylor-shopping.com';
      var SCRIPT_HOST = 'm675.taylor-shopping.com';
      var EXPECTED_RPC_HOST = BLUECONIC_HOSTNAME;
      var TENANT_HOST = 'fphc.blueconic.net';
​
      document.getElementById('origin').textContent = location.origin;
      document.getElementById('iframeUrl').textContent = CHANNEL_PAGE_URL;
      document.getElementById('scriptHost').textContent = SCRIPT_HOST;
      document.getElementById('expectedRpcHost').textContent = EXPECTED_RPC_HOST;
      document.getElementById('tenantHost').textContent = TENANT_HOST;
      document.getElementById('channelFrame').src = CHANNEL_PAGE_URL;
    </script>
  </body>
</html>
