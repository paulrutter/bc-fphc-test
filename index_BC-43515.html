<!DOCTYPE html>

<html lang="en">

    <h1>Parent page — origin <code id="origin"></code></h1>

      document.getElementById('expectedRpcHost').textContent = EXPECTED_RPC_HOST;
      document.getElementById('tenantHost').textContent = TENANT_HOST;
